<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Agent Graph Visualizer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre-d3/0.6.4/dagre-d3.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            flex-direction: column;
            background-color: #f8f9fa;
        }

        header {
            background-color: #212529;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-connected {
            background-color: #28a745;
        }

        .status-disconnected {
            background-color: #dc3545;
        }

        #graph-container {
            flex-grow: 1;
            overflow: auto;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .node rect, .node circle, .node ellipse, .node polygon {
            stroke: #343a40;
            fill: #ffffff;
            stroke-width: 2px;
            rx: 5;
            ry: 5;
        }

        .node text {
            font-family: monospace;
            font-size: 14px;
        }

        .edgePath path {
            stroke: #6c757d;
            stroke-width: 2px;
            fill: none;
        }

        .edgeLabel text {
            font-size: 12px;
            background-color: white;
            padding: 2px;
        }

        /* Status classes */
        .node.running > * {
            stroke: #007bff;
            fill: #e7f1ff;
            stroke-width: 3px;
        }

        .node.completed > * {
            stroke: #28a745;
            fill: #d4edda;
        }

        .node.failed > * {
            stroke: #dc3545;
            fill: #f8d7da;
        }

        /* Type classes */
        .node.type-event_loop > * {
            stroke-dasharray: 5, 5;
            fill: #fff3cd;
        }

        #panel {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 300px;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 80vh;
            overflow-y: auto;
        }

        .panel-row {
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .panel-row:last-child {
            border-bottom: none;
        }

        h3 { margin-top: 0; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2>Hive Graph Visualizer</h2>
    <div id="connection-status" class="status-badge status-disconnected">Disconnected</div>
</header>

<div id="graph-container">
    <svg id="graph-svg"><g/></svg>
    <div id="panel" class="hidden">
        <h3 id="panel-title">Node Details</h3>
        <div id="panel-content"></div>
    </div>
</div>

<script>
    // Initialize Dagre D3
    const g = new dagreD3.graphlib.Graph().setGraph({
        rankdir: "TB",
        nodesep: 50,
        ranksep: 50,
        marginx: 20,
        marginy: 20
    });

    const svg = d3.select("svg");
    const inner = svg.select("g");

    // Set up zoom support
    const zoom = d3.zoom().on("zoom", (e) => {
        inner.attr("transform", e.transform);
    });
    svg.call(zoom);

    const render = new dagreD3.render();

    let graphData = null;

    function renderGraph() {
        if (!graphData) return;

        // Clear existing graph
        g.nodes().forEach(v => g.removeNode(v));
        g.edges().forEach(e => g.removeEdge(e.v, e.w));

        // Add nodes
        graphData.nodes.forEach(node => {
            const classStr = `type-${node.type} ${node.status || 'pending'}`;
            g.setNode(node.id, {
                label: node.name || node.id,
                class: classStr,
                rx: 5,
                ry: 5,
                description: node.description,
                type: node.type
            });
        });

        // Add edges
        graphData.edges.forEach(edge => {
            g.setEdge(edge.source, edge.target, {
                label: edge.label || "",
                curve: d3.curveBasis
            });
        });

        render(inner, g);

        // Center graph
        const bounds = inner.node().getBBox();
        const parent = svg.node().parentElement;
        const width = parent.clientWidth;
        const height = parent.clientHeight;

        if (bounds.width > 0 && bounds.height > 0) {
            const scale = Math.min(
                0.9,
                Math.min(width / bounds.width, height / bounds.height)
            );

            svg.call(zoom.transform, d3.zoomIdentity
                .translate((width - bounds.width * scale) / 2, (height - bounds.height * scale) / 2)
                .scale(scale)
            );
        }

        // Add click handler for nodes
        inner.selectAll("g.node").on("click", (e, id) => {
            const node = graphData.nodes.find(n => n.id === id);
            if (node) {
                showPanel(node);
            }
        });
    }

    function showPanel(node) {
        const panel = document.getElementById("panel");
        const title = document.getElementById("panel-title");
        const content = document.getElementById("panel-content");

        title.textContent = node.name || node.id;

        let html = "";
        html += `<div class="panel-row"><strong>ID:</strong> ${node.id}</div>`;
        html += `<div class="panel-row"><strong>Type:</strong> ${node.type || 'unknown'}</div>`;
        if (node.description) {
            html += `<div class="panel-row"><strong>Description:</strong><br/>${node.description}</div>`;
        }
        if (node.status) {
            html += `<div class="panel-row"><strong>Status:</strong> ${node.status}</div>`;
        }

        content.innerHTML = html;
        panel.classList.remove("hidden");
    }

    function updateNodeClass(id, statusClass) {
        if (!graphData) return;
        const node = graphData.nodes.find(n => n.id === id);
        if (node) {
            node.status = statusClass;
            const uiNode = inner.select(`g.node[title='${id}']`); // title logic sometimes used or g.node directly
            renderGraph(); // Re-render for simplicity
        }
    }

    // Try to parse window.__INITIAL_DATA__ for static exports
    if (window.__INITIAL_DATA__) {
        graphData = window.__INITIAL_DATA__;
        renderGraph();
    } else {
        // Connect to WebSocket if not static
        const wsPort = parseInt(window.location.port) + 1;
        const wsUrl = `ws://${window.location.hostname}:${wsPort}/ws`;

        function connectWS() {
            const ws = new WebSocket(wsUrl);
            const statusBadge = document.getElementById("connection-status");

            ws.onopen = () => {
                console.log("Connected to Hive visualizer server");
                statusBadge.textContent = "Live";
                statusBadge.className = "status-badge status-connected";
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === "graph") {
                    graphData = msg.data;
                    renderGraph();
                } else if (msg.type === "node_start") {
                    updateNodeClass(msg.node_id, "running");
                } else if (msg.type === "node_complete") {
                    updateNodeClass(msg.node_id, msg.success ? "completed" : "failed");
                }
            };

            ws.onclose = () => {
                statusBadge.textContent = "Disconnected";
                statusBadge.className = "status-badge status-disconnected";
                setTimeout(connectWS, 2000); // Reconnect
            };
        }

        connectWS();
    }
</script>
</body>
</html>
